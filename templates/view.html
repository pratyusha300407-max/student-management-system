<!DOCTYPE html>
<html>
<head>
    <title>View Students</title>
    <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
</head>
<body>

    <h1>Student List</h1>

    <table>
        <tr>
            <th>id</th>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
        </tr>
        {% for student in students %}
        <tr>
            <td>{{student[0]}}</td>
            <td>{{student[1]}}</td>
            <td>{{student[2]}}</td>
            <td>{{student[3]}}</td>
            <td>
                <a href="/edit/{{student[0]}}">Edit</a> 
                <a href="/delete/{{student[0]}}">Delete</a>
            </td>

        </tr>
        {% endfor %}
    </table>

    <br>
    <div class="center-link">
       <a href="/">Back to Registration</a>
    </div>
   

</body>
</html>
